name: Deploy to Vultr

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 67.219.111.199
          port: 22
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/mub-bot
            git pull origin main
            screen -S bot -X stuff "^C"
            sleep 1
            screen -S bot -X stuff "python3 main.py\n"
